env:
  IN_PKGDOWN: "true"

url: https://phmcc.github.io/summata/

destination: docs

repo:
  url:
    home: https://github.com/phmcc/summata/
    source: https://github.com/phmcc/summata/tree/main/
    issue: https://github.com/phmcc/summata/issues/
    user: https://github.com/phmcc/

template:
  assets: pkgdown
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    bg: "#F8F9FA"
    fg: "#2F2F2F"
    primary: "#2F2F2F"
    body-color: "#2F2F2F"
    headings-color: "#1D1D1D"
    link-color: "#5A5A5A"
  math-rendering: mathjax

code:
  width: 240
  knitr:
    opts_chunk:
      dev: "ragg_png"
      dpi: 150
      R.options: 
        width: 160

home:
  title: summata - Publication-Ready Summary Tables and Forest Plots
  description: Efficient summary statistics workflows built on data.table
  sidebar:
    structure: [links, license, community, citation, authors, dev]
    components:
      license:
        title: License
        text: "[GPL ≥ 3.0](LICENSE.html)"

navbar:
  structure:
    left: [home, intro, vignettes, articles, news, reference]
    right: [search, codeberg, github]
  components:
    home:
      icon: fa-home
      href: index.html
      aria-label: Home
    intro:
      text: Installation
      href: articles/installation_setup.html
    vignettes:
      text: Vignettes
      menu:
      - text: Descriptive Tables
        href: articles/descriptive_tables.html
      - text: Survival Tables
        href: articles/survival_tables.html
      - text: Regression Modeling
        href: articles/regression_modeling.html
      - text: Table Export
        href: articles/table_export.html
      - text: Forest Plots
        href: articles/forest_plots.html
      - text: Model Comparison
        href: articles/model_comparison.html
      - text: Multivariate Regression
        href: articles/multivariate_regression.html
      - text: Advanced Workflows
        href: articles/advanced_workflows.html
    articles:
      text: Articles
      menu:
      - text: Feature Comparison
        href: articles/feature_comparison.html
      - text: Benchmarks
        href: articles/benchmarks.html
      - text: Development Roadmap
        href: articles/development_roadmap.html
      - text: Statistical Foundations
        href: articles/statistical_foundations.html

    news:
      text: Changelog
      href: news/index.html
    reference:
      text: Functions
      href: reference/index.html
    codeberg:
      icon: fa-code-branch
      href: https://codeberg.org/phmcc/summata
      aria-label: Codeberg
    github:
      icon: fa-github
      href: https://github.com/phmcc/summata
      aria-label: GitHub

reference:
- title: Descriptive Functions
  contents:
  - desctable
  - survtable
  
- title: Regression Functions
  contents:
  - uniscreen
  - fit
  - fullfit
  - compfit
  - multifit
  
- title: Export Functions
  contents:
  - autotable
  - table2pdf
  - table2docx
  - table2html
  - table2pptx
  - table2tex
  - table2rtf
  
- title: Visualization Functions
  contents:
  - autoforest
  - lmforest
  - glmforest
  - coxforest
  - uniforest
  - multiforest
  
- title: Utility Functions
  contents:
  - m2dt

- title: Sample Data
  contents:
  - clintrial
  - clintrial_labels

footer:
  structure:
    left: developed_by
    right: [built_with, legal]
  components:
    legal: "[GPLv3 License](https://phmcc.github.io/summata/LICENSE.html) | [Code of Conduct](https://phmcc.github.io/summata/CODE_OF_CONDUCT.html)"
